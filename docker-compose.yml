# ─────────────────────────────────────────────────────────────────────────────
# AI Code Review Agent — Docker Compose
# Usage:
#   Development : docker compose up
#   Production  : docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-code-review-agent:latest
    container_name: ai-code-review-agent
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # ── LLM Provider (pick one) ────────────────────────────────────────────
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # ── GitHub ────────────────────────────────────────────────────────────
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # ── App config ────────────────────────────────────────────────────────
      - MAX_FILES=${MAX_FILES:-30}
      - MAX_FILE_SIZE_KB=${MAX_FILE_SIZE_KB:-500}
      - CLONE_DIR=/tmp/ai_code_review_repos
      - REPORTS_DIR=/app/reports
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - DEBUG=${DEBUG:-false}
    volumes:
      # Persist review reports across container restarts
      - reports_data:/app/reports
      # Clone cache (optional — speeds up repeated runs)
      - clone_cache:/tmp/ai_code_review_repos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ai_review_net

  # ── (Optional) Nginx reverse proxy for production ──────────────────────────
  # Uncomment for production deployments behind a domain
  # nginx:
  #   image: nginx:alpine
  #   container_name: ai-review-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - ai_review_net

volumes:
  reports_data:
    driver: local
  clone_cache:
    driver: local

networks:
  ai_review_net:
    driver: bridge
